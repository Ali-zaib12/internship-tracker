<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – InternTrack</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <script src="/js/app.js"></script>
  <div class="page-container">
    <div class="page-header">
      <h1 class="page-title">My Profile</h1>
    </div>
    <div class="profile-grid">
      <!-- Left: Info & Stats -->
      <div>
        <div class="card" style="margin-bottom:20px">
          <div class="avatar-big" id="avatarBig">?</div>
          <div style="font-size:20px;font-weight:700" id="profileName">–</div>
          <div style="color:var(--muted);font-size:14px;margin-top:4px" id="profileEmail">–</div>
          <div style="color:var(--muted);font-size:13px;margin-top:2px" id="profileUni">–</div>
          <div style="color:var(--muted);font-size:12px;margin-top:8px" id="profileJoined">–</div>
        </div>
        <div class="card">
          <div style="font-weight:600;margin-bottom:12px">Application Stats</div>
          <div class="stat-row">
            <div class="mini-stat"><div class="mini-stat-val" id="sTotal">–</div><div class="mini-stat-label">Total</div></div>
            <div class="mini-stat"><div class="mini-stat-val" style="color:var(--yellow)" id="sInterview">–</div><div class="mini-stat-label">Interviews</div></div>
            <div class="mini-stat"><div class="mini-stat-val" style="color:var(--green)" id="sOffers">–</div><div class="mini-stat-label">Offers</div></div>
          </div>
        </div>
      </div>

      <!-- Right: Edit Form -->
      <div class="card">
        <div style="font-weight:700;font-size:18px;margin-bottom:20px">Edit Profile</div>
        <form id="profileForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="pName" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="pEmail" disabled style="opacity:0.5;cursor:not-allowed">
            <small style="color:var(--muted);font-size:12px">Email cannot be changed</small>
          </div>
          <div class="form-group">
            <label>University</label>
            <input type="text" id="pUniversity" placeholder="Your university name">
          </div>

          <div style="border-top:1px solid var(--border);margin:20px 0;padding-top:20px">
            <div style="font-weight:600;margin-bottom:16px">Change Password <span style="font-size:12px;color:var(--muted);font-weight:400">(leave blank to keep current)</span></div>
            <div class="form-group">
              <label>Current Password</label>
              <input type="password" id="pCurrentPass" placeholder="••••••••">
            </div>
            <div class="form-group">
              <label>New Password</label>
              <input type="password" id="pNewPass" placeholder="••••••••">
            </div>
          </div>

          <div class="error-msg" id="profileError"></div>
          <div style="color:var(--green);font-size:13px;margin-bottom:8px;display:none" id="profileSuccess">Profile updated successfully</div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Save Changes</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    (async () => {
      const user = await initPage('profile');
      if (!user) return;

      document.getElementById('avatarBig').textContent = user.name.charAt(0).toUpperCase();
      document.getElementById('profileName').textContent = user.name;
      document.getElementById('profileEmail').textContent = user.email;
      document.getElementById('profileUni').textContent = user.university || 'University not set';
      document.getElementById('profileJoined').textContent = 'Joined ' + new Date(user.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('pName').value = user.name;
      document.getElementById('pEmail').value = user.email;
      document.getElementById('pUniversity').value = user.university || '';

      const stats = await fetch('/api/applications/stats').then(r => r.json());
      document.getElementById('sTotal').textContent = stats.total || 0;
      document.getElementById('sInterview').textContent = stats.interviews || 0;
      document.getElementById('sOffers').textContent = stats.offers || 0;
    })();

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('profileError');
      const success = document.getElementById('profileSuccess');
      err.style.display = 'none'; success.style.display = 'none';

      const body = { name: pName.value, university: pUniversity.value };
      if (pNewPass.value) { body.current_password = pCurrentPass.value; body.new_password = pNewPass.value; }

      const res = await fetch('/api/auth/profile', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();
      if (data.success) {
        success.style.display = 'block';
        document.getElementById('profileName').textContent = pName.value;
        document.getElementById('avatarBig').textContent = pName.value.charAt(0).toUpperCase();
        pCurrentPass.value = ''; pNewPass.value = '';
        showToast('Profile updated');
      } else {
        err.textContent = data.error; err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
