<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – InternTrack</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo h1 { font-size: 32px; font-weight: 800; color: var(--accent); }
    .auth-logo p { color: var(--muted); margin-top: 6px; font-size: 14px; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
    .auth-tabs { display: flex; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
    .auth-tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
    .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .btn-full { width: 100%; justify-content: center; padding: 12px; font-size: 15px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="auth-logo">
      <h1>InternTrack</h1>
      <p>Track every application. Land your internship.</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Login</div>
        <div class="auth-tab" onclick="switchTab('register')">Sign Up</div>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <div class="error-msg" id="loginError"></div>
        <button type="submit" class="btn btn-primary btn-full">Login</button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Ali Hassan" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>University</label>
          <input type="text" id="regUniversity" placeholder="University of Karachi">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="••••••••" required>
        </div>
        <div class="error-msg" id="registerError"></div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.querySelectorAll('.auth-form').forEach((f, i) => {
        f.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('loginError');
      err.style.display = 'none';
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: loginEmail.value, password: loginPassword.value })
      });
      const data = await res.json();
      if (data.success) window.location.href = '/pages/dashboard.html';
      else { err.textContent = data.error; err.style.display = 'block'; }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('registerError');
      err.style.display = 'none';
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: regName.value, email: regEmail.value, university: regUniversity.value, password: regPassword.value })
      });
      const data = await res.json();
      if (data.success) { switchTab('login'); alert('Account created! Please login.'); }
      else { err.textContent = data.error; err.style.display = 'block'; }
    });
  </script>
</body>
</html>
